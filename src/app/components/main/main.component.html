<div class="main">
  <div class="head">
    <app-head></app-head>
  </div>
  <div class="body">

      <app-side-bar></app-side-bar>
    </div>
    <div class="explorer">
      <app-explorer></app-explorer>
    </div>
    <div class="center">
      <div class="center-header">
        <app-center-header (page)="onListenClicked($event)"></app-center-header>
      </div>
      <div class="center-body">
        <app-center-body [pageBody]="page"></app-center-body>
      </div>
    </div>
  </div>
</div>
