<div class="center-header">
  <div class="menu">
    <div
      class="menu-item"
      [ngClass]="{ active: isClickedWelcome }"
      (click)="onPageClicked('welcome')"
    >
      <div class="img">
        <img src="vscode.png" alt="logo" />
      </div>
      <div class="menu-name">
        <span class="name">Welcome</span>
      </div>
      <div class="menu-close">
        <span>x</span>
      </div>
    </div>
    <div
      class="menu-item"
      [ngClass]="{ active: isClickedUser }"
      (click)="onPageClicked('user')"
    >
      <div class="img">
        <img src="html-logo.png" alt="logo" />
      </div>
      <div class="menu-name">
        <span class="name">Preview README.md </span>
      </div>
      <div class="menu-close">
        <span>x</span>
      </div>
    </div>
    <div
      class="menu-item"
      [ngClass]="{ active: isClickedProjet }"
      (click)="onPageClicked('projet')"
    >
      <div class="img">
        <img src="css-logo.png" alt="logo" />
      </div>
      <div class="menu-name">
        <span class="name">Liste_projet.json</span>
      </div>
      <div class="menu-close">
        <span>x</span>
      </div>
    </div>
  </div>
</div>
